services:
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/testpassword
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  python:
    build: .
    depends_on:
      neo4j:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=testpassword
    extra_hosts:
      - "host.docker.internal:host-gateway"
