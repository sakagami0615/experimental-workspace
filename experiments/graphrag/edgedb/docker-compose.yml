services:
  edgedb:
    image: edgedb/edgedb:5
    environment:
      EDGEDB_SERVER_SECURITY: insecure_dev_mode
      EDGEDB_SERVER_EXTRA_ARGS: --devmode
    ports:
      - "5656:5656"
    volumes:
      - edgedb_data:/var/lib/edgedb/data
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(1); s.connect(('localhost', 5656)); s.close()\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  python:
    build: .
    depends_on:
      edgedb:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      - EDGEDB_DSN=edgedb://edgedb@edgedb:5656/edgedb?tls_security=insecure
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  edgedb_data:
